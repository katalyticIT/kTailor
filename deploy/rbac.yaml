---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ktailor
  namespace: ktailor

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ktailor-configmap-reader
rules:
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ktailor-configmap-reader-binding
subjects:
- kind: ServiceAccount
  name: ktailor
  namespace: ktailor
roleRef:
  kind: ClusterRole
  name: ktailor-configmap-reader
  apiGroup: rbac.authorization.k8s.io
