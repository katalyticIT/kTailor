apiVersion: v1
kind: ConfigMap
metadata:
  name: ktailor-templates
  namespace: ktailor
data:
  ktailor-test.yaml: |
    ---
    kind: ktailor-template
    meta:
      name: ktailor-test
      autor: "katalytic IT"
      version: 1.0
      date: "2026-03-31"

    modifyContainers:
      insertOrOverwrite:
        env:
          - name: KTAILORTEST
            value: "Env set by central kTailor template."
